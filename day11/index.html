<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <main>
      <form action="">
        <fieldset>
          <legend>Personal Info</legend>

          <div>
            <label for="name">Name</label> <br />
            <input id="name" type="text" placeholder="John doe" />
          </div>
          <br />
          <div>
            <label for="email">Email</label> <br />
            <input id="email" type="text" placeholder="example@gmail.com" />
          </div>
          <br />
          <div>
            <label for="mobile">Mobile</label> <br />
            <input id="mobile" type="text" placeholder="John doe" />
          </div>
        </fieldset>

        <fieldset>
          <legend>Address</legend>

          <div>
            <label for="street">Street</label> <br />
            <input id="street" type="text" placeholder="Jammuri nagar" />
          </div>
          <br />
          <div>
            <label for="lm">Landmark</label> <br />
            <input id="lm" type="text" placeholder="near kapoors cafe" />
          </div>
        </fieldset>
        <br />

        <button>Submit</button>
      </form>

      <div class="users">
        
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
